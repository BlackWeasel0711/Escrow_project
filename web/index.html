<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafePay Escrow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Load fonts without blocking render: text shows immediately, swaps to Sora/Inter when ready. -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" /></noscript>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Gradient palette for the SVG icon set -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <linearGradient id="gP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b6ef5"/><stop offset=".55" stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="gPk" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a855f7"/><stop offset="1" stop-color="#ec4899"/></linearGradient>
    <linearGradient id="gG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34e0a1"/><stop offset="1" stop-color="#22b8cf"/></linearGradient>
    <linearGradient id="gGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fcd34d"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
  </defs></svg>

  <!-- Exodus-style deep gradient background -->
  <div class="aurora" aria-hidden="true">
    <span class="a1"></span><span class="a2"></span><span class="a3"></span><span class="a4"></span>
    <div class="aurora-grid"></div>
  </div>

  <!-- Auto-flowing escrow-themed background scenes (self-contained SVG, crossfade) -->
  <div class="slideshow" aria-hidden="true">
    <div class="bg-slide s1">
      <svg class="bg-motif" viewBox="0 0 24 24"><path fill="url(#gG)" d="M12 2.2l7.4 3.1c.5.2.8.7.8 1.2v5c0 5-3.4 9.2-8.2 10.5C7.2 20.7 3.8 16.5 3.8 11.5v-5c0-.5.3-1 .8-1.2L12 2.2z"/><path fill="#0b0c1c" d="M10.8 15.2l-2.7-2.7 1.5-1.5 1.2 1.2 3.7-3.7 1.5 1.5-5.2 5.2z"/></svg>
    </div>
    <div class="bg-slide s2">
      <svg class="bg-motif" viewBox="0 0 100 100"><g fill="url(#gB)"><ellipse cx="50" cy="72" rx="33" ry="11"/><ellipse cx="50" cy="60" rx="33" ry="11"/><ellipse cx="50" cy="48" rx="33" ry="11"/><ellipse cx="50" cy="36" rx="33" ry="11"/></g></svg>
    </div>
    <div class="bg-slide s3">
      <svg class="bg-motif" viewBox="0 0 130 80"><g fill="none" stroke="url(#gPk)" stroke-width="7"><circle cx="48" cy="40" r="27"/><circle cx="82" cy="40" r="27"/></g></svg>
    </div>
    <div class="bg-slide s4">
      <svg class="bg-motif" viewBox="0 0 24 24"><path fill="url(#gP)" d="M13 4.6a1.5 1.5 0 10-2 0V6l-6 1.6v1.86l1.94-.52-1.74 4.66a3.1 3.1 0 006.06 0L9.5 8.55 11 8.15V18.5H7.5a1 1 0 100 2h9a1 1 0 100-2H13V8.15l1.5.4-1.82 4.65a3.1 3.1 0 006.06 0L17 8.94l1.94.52V7.6L13 6V4.6z"/></svg>
    </div>
  </div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand" data-nav="dashboard"></div>
    <nav id="nav" class="nav"></nav>
  </header>

  <main id="view" class="view"></main>

  <div id="toast" class="toast" hidden></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
