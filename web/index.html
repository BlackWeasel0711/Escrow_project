<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafePay Escrow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Load fonts without blocking render: text shows immediately, swaps to Sora/Inter when ready. -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" /></noscript>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Gradient palette for the SVG icon set -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <linearGradient id="gP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b6ef5"/><stop offset=".55" stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="gPk" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a855f7"/><stop offset="1" stop-color="#ec4899"/></linearGradient>
    <linearGradient id="gG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34e0a1"/><stop offset="1" stop-color="#22b8cf"/></linearGradient>
    <linearGradient id="gGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fcd34d"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="gShield" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#9a7bff"/><stop offset="1" stop-color="#4a2ea0"/></linearGradient>
    <linearGradient id="gShieldFace" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b9a3ff"/><stop offset="1" stop-color="#6a3fd6"/></linearGradient>
    <radialGradient id="gLock" cx="0.4" cy="0.3"><stop offset="0" stop-color="#e6ddff"/><stop offset="1" stop-color="#7c5cff"/></radialGradient>
  </defs></svg>

  <!-- Glowing 3D shield hero graphic (shown on the auth screen) -->
  <div class="hero-shield" aria-hidden="true">
    <svg viewBox="0 0 320 360" width="320" height="360">
      <ellipse cx="162" cy="205" rx="150" ry="58" fill="none" stroke="rgba(165,145,255,.22)" stroke-width="1.4" transform="rotate(-18 162 205)"/>
      <circle cx="30" cy="150" r="4" fill="#b9a8ff"/>
      <circle cx="292" cy="250" r="3.6" fill="#e08bff"/>
      <circle cx="256" cy="112" r="2.6" fill="#8b9dff"/>
      <circle cx="66" cy="272" r="2.4" fill="#a78bff"/>
      <g class="shield-body">
        <path d="M160 24C160 24 74 54 52 60C48 61 46 64 46 68L46 186C46 262 100 318 160 344C220 318 274 262 274 186L274 68C274 64 272 61 268 60C246 54 160 24 160 24Z" fill="url(#gShield)" opacity=".5"/>
        <path d="M160 44C160 44 84 70 64 76C61 77 60 79 60 82L60 184C60 250 106 300 160 324C214 300 260 250 260 184L260 82C260 79 259 77 256 76C236 70 160 44 160 44Z" fill="url(#gShieldFace)" opacity=".55"/>
        <path d="M160 44C160 44 84 70 64 76C61 77 60 79 60 82L60 140C120 120 200 120 260 140L260 82C260 79 259 77 256 76C236 70 160 44 160 44Z" fill="rgba(255,255,255,.16)"/>
        <path d="M140 172L140 158A20 20 0 0 1 180 158L180 172" fill="none" stroke="#d9ccff" stroke-width="9" stroke-linecap="round"/>
        <rect x="128" y="170" width="64" height="56" rx="12" fill="url(#gLock)"/>
        <circle cx="160" cy="192" r="6.5" fill="#3a1d80"/>
        <rect x="156.5" y="193" width="7" height="17" rx="3.5" fill="#3a1d80"/>
      </g>
    </svg>
  </div>

  <!-- Exodus-style deep gradient background -->
  <div class="aurora" aria-hidden="true">
    <span class="a1"></span><span class="a2"></span><span class="a3"></span><span class="a4"></span>
    <div class="aurora-grid"></div>
  </div>

  <!-- World-map backdrop (self-contained dotted SVG) for the global escrow theme -->
  <div class="worldmap" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand" data-nav="dashboard"></div>
    <nav id="nav" class="nav"></nav>
  </header>

  <main id="view" class="view"></main>

  <div id="toast" class="toast" hidden></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
