# One command to run the whole product locally:  docker compose up --build
# Then open http://localhost:4000  (web app + API served from the same origin).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escrow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/escrow
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SIMULATE_PAYMENTS: ${SIMULATE_PAYMENTS:-true}
      PORT: "4000"
    ports:
      - "4000:4000"

volumes:
  pgdata:
