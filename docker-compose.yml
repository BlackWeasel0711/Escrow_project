# One-command local/production-like stack:  docker compose up --build
# Web:  http://localhost:8080     API:  http://localhost:4000
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escrow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/escrow
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SIMULATE_PAYMENTS: ${SIMULATE_PAYMENTS:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      PORT: "4000"
    ports:
      - "4000:4000"

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
