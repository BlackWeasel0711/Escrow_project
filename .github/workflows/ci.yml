name: CI/CD

# Runs on every push to main and on every pull request.
#   • Pull requests  → run all TESTS only (safe: nothing is built or deployed).
#   • Push to main   → run tests, then BUILD a Docker image, then DEPLOY it.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1 — TESTS.  Three jobs run in parallel; all must pass before we build.
  # ---------------------------------------------------------------------------
  backend:
    name: Test · Backend (typecheck + end-to-end verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit
      - name: End-to-end verify (embedded Postgres, full escrow lifecycle)
        run: node scripts/verify.mjs
      - name: Verify real payment code path (SIMULATE_PAYMENTS=false vs mock gateways)
        run: node scripts/verify-live.mjs

  web:
    name: Test · Web (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check web/app.js
      - run: node --check web/config.js

  android:
    name: Test · Android (compile assembleDebug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

  # ---------------------------------------------------------------------------
  # STAGE 2 — BUILD.  Only after all tests pass, on a push to main. Builds the
  # production Docker image and publishes it to the GitHub Container Registry.
  # ---------------------------------------------------------------------------
  docker:
    name: Build · Docker image → GHCR
    runs-on: ubuntu-latest
    needs: [backend, web, android]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write      # allows pushing the image to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # provided automatically by GitHub

      - name: Compute image tags (repo name lowercased for GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha                                # also tag with the commit SHA

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # STAGE 3 — DEPLOY.  After the image is built, tell the host to go live.
  # Set a repo secret RENDER_DEPLOY_HOOK (Render → your service → Settings →
  # Deploy Hook) to enable this. Without it, the step safely skips.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy · Trigger host release
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "No RENDER_DEPLOY_HOOK secret set — skipping deploy."
            echo "Add it in: repo Settings → Secrets and variables → Actions → New repository secret,"
            echo "using the Deploy Hook URL from your Render service. Then every push auto-deploys."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK"
          echo "Deploy triggered on the host."
