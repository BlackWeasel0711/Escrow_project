name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck & end-to-end verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit
      - name: End-to-end verify (embedded Postgres, full escrow lifecycle)
        run: node scripts/verify.mjs
      - name: Verify real payment code path (SIMULATE_PAYMENTS=false vs mock gateways)
        run: node scripts/verify-live.mjs

  web:
    name: Web — syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check web/app.js
      - run: node --check web/config.js

  android:
    name: Android — compile (assembleDebug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
